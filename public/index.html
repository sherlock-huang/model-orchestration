<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOP - Model Orchestration Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00d4ff;
      margin-bottom: 10px;
      font-size: 2em;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    .panel {
      background: rgba(26, 26, 46, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(42, 42, 74, 0.5);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .panel-title {
      color: #00d4ff;
      font-size: 1.3em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }
    .panel-title::before {
      content: '▶';
      font-size: 0.8em;
      color: #00d4ff;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .model-card {
      background: rgba(22, 33, 62, 0.6);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(42, 42, 74, 0.5);
      transition: all 0.3s ease;
    }
    .model-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: 0 12px 40px rgba(0, 212, 255, 0.1);
    }
    .model-card h3 {
      color: #00d4ff;
      margin-bottom: 10px;
      font-size: 1.2em;
    }
    .model-card .provider {
      color: #888;
      font-size: 0.9em;
      margin-bottom: 12px;
    }
    .model-card .capability {
      display: inline-block;
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.85em;
      margin: 4px 4px 4px 0;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
    .model-card .max-tokens {
      background: rgba(255, 230, 109, 0.1);
      color: #ffe.e66d;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.85em;
      margin-top: 10px;
      display: inline-block;
    }

    .test-section {
      margin-top: 20px;
    }
    .test-btn {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      margin: 8px 6px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
    }
    .test-btn:hover {
      background: linear-gradient(135deg, #00bbee, #0088aa);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
    }
    .test-btn:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .test-btn.active {
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.5), 0 4px 15px rgba(0, 212, 255, 0.3);
    }

    textarea {
      width: 100%;
      background: rgba(10, 10, 26, 0.8);
      border: 1px solid rgba(42, 42, 74, 0.5);
      border-radius: 8px;
      color: #e0e0e0;
      padding: 16px;
      font-size: 15px;
      resize: vertical;
      min-height: 100px;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      transition: border-color 0.3s ease;
    }
    textarea:focus {
      outline: none;
      border-color: #00d4ff;
    }

    .result-box {
      background: rgba(10, 10, 26, 0.8);
      border: 1px solid rgba(42, 42, 74, 0.5);
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.7;
    }
    .result-box .meta {
      color: #888;
      font-size: 0.9em;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(42, 42, 74, 0.5);
    }

    .result-detail {
      background: rgba(22, 33, 62, 0.6);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      border-left: 4px solid #00d4ff;
    }
    .result-detail h4 {
      color: #00d4ff;
      margin-bottom: 12px;
      font-size: 1em;
    }
    .result-detail .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(42, 42, 74, 0.3);
    }
    .result-detail .row:last-child {
      border-bottom: none;
    }
    .result-detail .label {
      color: #888;
      font-size: 0.9em;
    }
    .result-detail .value {
      color: #fff;
      font-weight: 600;
      font-size: 0.95em;
    }
    .result-detail .value.highlight {
      color: #00ff88;
    }

    .dag-visual {
      background: rgba(10, 10, 26, 0.8);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      border: 1px solid rgba(42, 42, 74, 0.5);
    }
    .dag-visual h4 {
      color: #00d4ff;
      margin-bottom: 12px;
      font-size: 1em;
    }
    .dag-node {
      background: rgba(22, 33, 62, 0.8);
      border-radius: 6px;
      padding: 10px 14px;
      margin: 8px 0;
      border: 1px solid rgba(42, 42, 74, 0.5);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dag-node .num {
      background: #00d4ff;
      color: #000;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.9em;
    }
    .dag-node .desc {
      flex: 1;
      color: #ccc;
      font-size: 0.95em;
    }
    .dag-node .model {
      background: rgba(0, 255, 136, 0.15);
      color: #00ff88;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.85em;
      border: 1px solid rgba(0, 255, 136, 0.3);
    }

    #loadingIndicator {
      text-align: center;
      padding: 40px;
      color: #00d4ff;
      font-size: 1.2em;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .footer {
      text-align: center;
      padding: 30px 20px;
      color: #666;
      font-size: 0.9em;
    }
    .footer a {
      color: #00d4ff;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .footer a:hover {
      color: #00ff88;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 MOP</h1>
    <p class="subtitle">Model Orchestration Platform · 大模型聚合转发平台</p>

    <!-- 模型状态 -->
    <div class="panel">
      <div class="panel-title">可用模型状态</div>
      <div class="model-grid" id="modelGrid">
        <div class="model-card">
          <h3>加载中...</h3>
          <div class="provider">正在获取模型列表</div>
        </div>
      </div>
    </div>

    <!-- 功能测试 -->
    <div class="panel">
      <div class="panel-title">任务编排测试</div>

      <div class="test-section">
        <h3 style="color: #888; margin-bottom: 12px; font-size: 0.95em;">① 选择测试场景</h3>
        <button class="test-btn active" id="btn-simple" onclick="setPrompt('simple')">📝 简单任务</button>
        <button class="test-btn" id="btn-complex" onclick="setPrompt('complex')">🚀 复杂任务（自定义DAG）</button>
        <button class="test-btn" id="btn-creative" onclick="setPrompt('creative')">🎨 创意任务</button>
      </div>

      <div class="test-section">
        <h3 style="color: #888; margin-bottom: 12px; font-size: 0.95em;">② 编辑任务描述</h3>
        <textarea id="taskInput" placeholder="输入你的任务描述...">解释一下什么是 RESTful API</textarea>
      </div>

      <div class="test-section">
        <h3 style="color: #888; margin-bottom: 12px; font-size: 0.95em;">③ 选择调度策略</h3>
        <button class="test-btn active" id="btn-balanced" onclick="setStrategy('balanced')">⚖️ balanced 平衡模式</button>
        <button class="test-btn" id="btn-fast" onclick="setStrategy('fast')">⚡ fast 快速模式</button>
        <button class="test-btn" id="="btn-quality" onclick="setStrategy('quality')">🎯 quality 质量模式</button>
      </div>

      <div class="test-section">
        <button class="test-btn" onclick="sendRequest()" id="sendBtn">▶ 发送任务</button>
      </div>

      <div id="loadingIndicator" style="display: none;">
        <div>⏳ 任务编排中，请稍候...</div>
        <div style="color: #888; margin-top: 10px; font-size: 0.9em;">多模型协同可能需要几秒钟</div>
      </div>

      <!-- 结果区域 -->
      <div class="result-box" id="resultBox">
        <div class="meta">结果将显示在这里...</div>
      </div>
    </div>

    <div class="footer">
      <p>Powered by <a href="https://github.com/sherlock-huang/model-orchestration" target="_blank">Model Orchestration Platform</a> · v0.1.0</p>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let currentStrategy = 'balanced';
    let currentPrompt = '';

    const prompts = {
      simple: '解释一下什么是 RESTful API',
      complex: '研究大模型性能对比：需要收集 GPT-4、Claude、DeepSeek 的性能数据，并生成对比报告',
      creative: '写一个关于 AI 的短篇故事，100 字左右'
    };

    function setPrompt(type) {
      currentPrompt = prompts[type];
      document.getElementById('taskInput').value = currentPrompt;

      // 更新按钮状态
      Object.keys(prompts).forEach(key => {
        const btn = document.getElementById(`btn-${key}`);
        if (btn) btn.classList.toggle('active', key === type);
      });
    }

    function setStrategy(strategy) {
      currentStrategy = strategy;

      // 更新按钮状态
      ['balanced', 'fast', 'quality'].forEach(s => {
        const btn = document.getElementById(`btn-${s}`);
        if (btn) btn.classList.toggle('active', s === strategy);
      });
    }

    async function loadModels() {
      try {
        const res = await fetch(`${API_BASE}/api/models`);
        const data = await res.json();

        const grid = document.getElementById('modelGrid');
        let html = '';

        if (data.models && data.models.length > 0) {
          data.models.forEach(model => {
            const capabilities = model.capabilities || {};
            const caps = [];

            if (capabilities.supports_functions) caps.push('函数调用');
            if (capabilities.supports_vision) caps.push('视觉');
            if (capabilities.max_tokens) caps.push(`${(capabilities.max_tokens / 1024).toFixed(0)}K 上下文`);

            html += `
              <div class="model-card">
                <h3>${model.name}</h3>
                <div class="provider">${model.provider}</div>
                <div style="margin: 8px 0;">
                  ${caps.map(cap => `<span class="capability">${cap}</span>`).join('')}
                </div>
                ${capabilities.cost_per_1k_tokens ? `
                  <div style="font-size: 0.85em; color: #888; margin-top: 8px;">
                    💰 成本: $${capabilities.cost_per_1k_tokens.prompt?.toFixed(3) || '0'}/1K tokens
                  </div>
                ` : ''}
              </div>
            `;
          });
        } else {
          html = '<div class="model-card"><h3>无可用模型</h3><div class="provider">请配置 API Keys</div></div>';
        }

        grid.innerHTML = html;
      } catch (e) {
        const grid = document.getElementById('modelGrid');
        grid.innerHTML = `
          <div class="model-card">
            <h3 style="color: #f66;">连接失败</h3>
            <div class="provider">无法获取模型列表</div>
            <div style="font-size: 0.9em; color: #888; margin-top: 8px;">${e.message}</div>
          </div>
        `;
      }
    }

    function showResult(data) {
      const resultBox = document.getElementById('resultBox');
      let html = '';

      // 状态
      if (data.status) {
        const statusColor = data.status === 'success' ? '#00ff88' : '#ff6b6b';
        html += `<div class="meta">状态: <span style="color: ${statusColor}; font-weight: 600;">${data.status}</span></div>`;
      }

      // 错误信息
      if (data.error) {
        html += `<div style="color: #ff6b6b; padding: 16px; background: rgba(255, 107, 107, 0.1); border-radius: 8px; margin: 12px 0;">
          ❌ 错误: ${data.error}
        </div>`;
      }

      // DAG 可视化
      if (data.dag && data.dag.tasks) {
        html += '<div class="dag-visual"><h4>🔄 任务 DAG</h4>';
        data.dag.tasks.forEach((task, index) => {
          const depends = task.depends_on || [];
          const dependText = depends.length > 0 ? `依赖: ${depends.join(', ')}` : '无依赖';
          html += `
            <div class="dag-node">
              <span class="num">${index + 1}</span>
              <span class="desc">${task.description}</span>
              <span class="model">→ ${task.model}</span>
            </div>
          `;
        });
        html += '</div>';
      }

      // 模型使用统计
      if (data.model_breakdown && data.model_breakdown.length > 0) {
        html += '<div class="result-detail"><h4>📊 模型使用统计</h4>';
        data.model_breakdown.forEach(b => {
          html += `
            <div class="row">
              <span class="label">模型</span>
              <span class="value">${b.model}</span>
            </div>
            <div class="row">
              <span class="label">消耗 Token</span>
              <span class="value">${b.tokens ? b.tokens.toLocaleString() : 'N/A'}</span>
            </div>
            <div class="row">
              <span class="label">成本</span>
              <span class="value highlight">$${b.cost ? b.cost.toFixed(4) : '0.0000'}</span>
            </div>
          `;
        });
        html += '</div>';
      }

      // 成本分析
      if (data.cost_analysis) {
        html += '<div class="result-detail"><h4>💰 成本分析</h4>';
        html += `
          <div class="row">
            <span class="label">总成本</span>
            <span class="value highlight">$${data.cost_analysis.total_cost?.toFixed(4) || '0.0000'}</span>
          </div>
        `;
        html += '</div>';
      }

      // 执行时间
      if (data.execution_time) {
        html += '<div class="result-detail"><h4>⏱️ 执行时间</h4>';
        html += `
          <div class="row">
            <span class="label">总耗时</span>
            <span class="value highlight">${data.execution_time.toFixed(2)} 秒</span>
          </div>
        `;
        html += '</div>';
      }

      // 最终结果
      if (data.result) {
        html += '<div style="margin-top: 20px;"><h4 style="color: #00d4ff; margin-bottom: 12px;">📄 最终结果</h4>';
        html += `<div style="background: rgba(22, 33, 62, 0.6); padding: 16px; border-radius: 8px; border: 1px solid rgba(42, 42, 74, 0.5);">${data.result}</div>`;
        html += '</div>';
      }

      resultBox.innerHTML = html;
    }

    async function sendRequest() {
      const task = document.getElementById('taskInput').value.trim();
      const btn = document.getElementById('sendBtn');
      const loading = document.getElementById('loadingIndicator');

      if (!task) {
        alert('请输入任务描述');
        return;
      }

      btn.disabled = true;
      if (loading) loading.style.display = 'block';

      const resultBox = document.getElementById('resultBox');
      resultBox.innerHTML = '<div class="meta">⏳ 任务编排中，请稍候...</div>';

      try {
        const requestBody = {
          task: task,
          strategy: currentStrategy
        };

        // 如果是复杂任务，添加自定义 DAG
        if (currentPrompt === prompts.complex) {
          requestBody.customDAG = {
            tasks: [
              {
                id: '1',
                description: '收集 GPT-4 和 Claude 的性能数据',
                model: 'kimi-pro',
                depends_on: []
              },
              {
                id: '2',
                description: '收集 DeepSeek 和 Qwen 的性能数据',
                model: 'minimax-abab6.5s-chat',
                depends_on: []
              },
              {
                id: '3',
                description: '对比分析并生成报告',
                model: 'volcengine-plan/ark-code-latest',
                depends_on: ['1', '2']
              }
            ],
            edges: [
              { from: '1', to: '3' },
              { from: '2', to: '3' }
            ]
          };
        }

        const res = await fetch(`${API_BASE}/api/orchestrate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        });

        const data = await res.json();
        showResult(data);
      } catch (e) {
        resultBox.innerHTML = `
          <div class="meta" style="color: #ff6b6b;">
            ❌ 请求失败: ${e.message}
          </div>
        `;
      }

      btn.disabled = false;
      if (loading) loading.style.display = 'none';
    }

    // 初始化
    loadModels();
    setPrompt('simple');
    setStrategy('balanced');
  </script>
</body>
</html>
